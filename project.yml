name: QuickMD
options:
  bundleIdPrefix: com.pedro
  deploymentTarget:
    macOS: '14.0'
packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: 0.6.0
  CodeEditorView:
    url: https://github.com/mchakravarty/CodeEditorView.git
    branch: main
targets:
  QuickMDApp:
    type: application
    platform: macOS
    sources:
      - path: QuickMDApp
      - path: Resources
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedro.QuickMDApp
        PRODUCT_NAME: QuickMD
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: QuickMDApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickMDApp/QuickMDApp.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LHY266XUWQ
    dependencies:
      - target: QuickMDPreviewExtension
      - package: swift-markdown
        product: Markdown
      - package: CodeEditorView
        product: CodeEditorView
      - package: CodeEditorView
        product: LanguageSupport

  QuickMDPreviewExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickMDPreviewExtension
      - path: Resources
        type: folder
        buildPhase: resources
    info:
      path: QuickMDPreviewExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
          NSExtensionAttributes:
            QLIsDataBasedPreview: true
            QLSupportedContentTypes:
              - net.daringfireball.markdown
              - public.markdown
              - org.commonmark.markdown
              - com.unknown.md
              - dyn.ah62d4rv4ge81e5pe
              - dyn.ah62d4rv4ge8043a
              - dyn.ah62d4rv4ge81c5pe
              - dyn.ah62d4rv4ge8043d2
              - dyn.ah62d4rv4ge8043dd
              - dyn.ah62d4rv4ge80c6dmqk
              - public.json
              - public.yaml
              - public.source-code
              - public.script
              - public.shell-script
              - public.python-script
              - public.ruby-script
              - public.perl-script
              - public.php-script
              - public.c-source
              - public.c-header
              - public.c-plus-plus-source
              - public.c-plus-plus-header
              - public.objective-c-source
              - public.objective-c-plus-plus-source
              - public.swift-source
              - com.sun.java-source
              - com.netscape.javascript-source
              - public.css
              - public.html
              - public.xml
              - org.rust-lang.rust
              - org.go-lang.go
              - public.type-script
              - com.microsoft.typescript
              - public.sql
              - org.jetbrains.kotlin
              - org.scala-lang.scala
              - org.haskell.source
              - public.lua-script
              - com.google.dart
              - public.toml
              - com.microsoft.c-sharp
              - com.microsoft.f-sharp
              - org.elixir-lang.source
              - org.erlang.source
              - org.clojure.source
              - org.ziglang.source
              - org.nim-lang.source
              - org.r-project.r
              - org.codehaus.groovy
              - com.docker.dockerfile
              - public.make-source
              - public.ini
              - public.plain-text
            QLSupportsSearchableItems: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedro.QuickMDApp.QuickMDPreviewExtension
        PRODUCT_NAME: QuickMDPreview
        ASSETCATALOG_COMPILER_APPICON_NAME: ExtensionIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LHY266XUWQ
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: QuickMDPreviewExtension/QuickMDPreviewExtension.entitlements
    dependencies:
      - package: swift-markdown
        product: Markdown
      - framework: QuickLookUI.framework
      - framework: WebKit.framework
      - framework: AppKit.framework

  QuickMDTests:
    type: bundle.unit-test
    platform: macOS
    sources: QuickMDTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/QuickMD.app/Contents/MacOS/QuickMD
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: QuickMDApp
